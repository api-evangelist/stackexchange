          type: string
          format: uuid
          example: 9f1f1ad2-9bcb-4f0c-9eee-1234567890ab
        revision_number:
          type: integer
          example: 4
        revision_type:
          type: string
          enum: [single_user, vote_based]
          example: single_user
        post_type:
          type: string
          enum: [question, answer]
          example: question
        post_id:
          type: integer
          example: 11227809
        comment:
          type: string
          example: 'Fixed typo'
        creation_date:
          type: integer
          format: int64
          example: 1338800000
        is_rollback:
          type: boolean
          example: false
        last_body:
          type: string
        last_title:
          type: string
        last_tags:
          type: array
          items:
            type: string
        body:
          type: string
        title:
          type: string
        tags:
          type: array
          items:
            type: string
        set_community_wiki:
          type: boolean
        user:
          $ref: '#/components/schemas/ShallowUser'
    SuggestedEdit:
      type: object
      description: A pending edit suggested by a user.
      properties:
        suggested_edit_id:
          type: integer
          example: 12345
        post_id:
          type: integer
          example: 11227809
        post_type:
          type: string
          enum: [question, answer]
          example: question
        body:
          type: string
        title:
          type: string
        tags:
          type: array
          items:
            type: string
        comment:
          type: string
        creation_date:
          type: integer
          format: int64
        approval_date:
          type: integer
          format: int64
        rejection_date:
          type: integer
          format: int64
        proposing_user:
          $ref: '#/components/schemas/ShallowUser'
    Notification:
      type: object
      description: An in-product notification for the authenticated user.
      properties:
        notification_type:
          type: string
          example: badge_earned
        creation_date:
          type: integer
          format: int64
          example: 1735000000
        is_unread:
          type: boolean
          example: true
        body:
