          type: boolean
        title:
          type: string
        body:
          type: string
        link:
          type: string
          format: uri
        question_id:
          type: integer
        answer_id:
          type: integer
        comment_id:
          type: integer
        site:
          $ref: '#/components/schemas/Site'
    Event:
      type: object
      description: A network event (1.5 minute live window).
      properties:
        event_type:
          type: string
          example: question_posted
        event_id:
          type: integer
        creation_date:
          type: integer
          format: int64
        link:
          type: string
          format: uri
        excerpt:
          type: string
    Info:
      type: object
      description: Site-wide totals and metadata.
      properties:
        total_questions:
          type: integer
        total_unanswered:
          type: integer
        total_accepted:
          type: integer
        total_answers:
          type: integer
        total_comments:
          type: integer
        total_votes:
          type: integer
        total_badges:
          type: integer
        total_users:
