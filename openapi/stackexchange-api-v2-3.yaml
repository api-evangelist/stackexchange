        site:
          $ref: '#/components/schemas/Site'
    AccessToken:
      type: object
      description: An OAuth access token, returned by the access-token endpoints.
      properties:
        access_token:
          type: string
        expires_on_date:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        scope:
          type: array
          items:
            type: string
    Post:
      type: object
      description: Generic post (question or answer) view.
      properties:
        post_id:
          type: integer
        post_type:
          type: string
          enum: [question, answer]
        body:
          type: string
        body_markdown:
          type: string
        link:
          type: string
          format: uri
        score:
          type: integer
        creation_date:
          type: integer
          format: int64
        last_activity_date:
          type: integer
          format: int64
        owner:
          $ref: '#/components/schemas/ShallowUser'
        comment_count:
          type: integer
    PrivilegeItem:
      type: object
      properties:
        short_description:
          type: string
        description:
          type: string
        reputation:
          type: integer
    ReputationChange:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        post_id:
          type: integer
        post_type:
          type: string
          enum: [question, answer]
        vote_type:
          type: string
          enum: [accepts, bounties_won, up_votes, down_votes, suggested_edit, post_undeleted, spam, vote_fraud_reversal, post_deleted, post_migrated, association_bonus]
        reputation_change:
          type: integer
        on_date:
          type: integer
          format: int64
    Filter:
      type: object
      properties:
        filter:
          type: string
        filter_type:
          type: string
          enum: [safe, unsafe, invalid]
        included_fields:
          type: array
          items:
            type: string
    QuestionsResponse:
      allOf:
      - $ref: '#/components/schemas/Wrapper'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Question'
    AnswersResponse:
      allOf:
      - $ref: '#/components/schemas/Wrapper'
      - type: object
        properties:
          items:
            type: array
            items:
