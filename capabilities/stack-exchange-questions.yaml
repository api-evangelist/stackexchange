          in: query
          type: string
          required: false
          description: Custom response filter id created via /filters/create.
        - name: page
          in: query
          type: integer
          required: false
          description: 1-indexed page number.
        - name: pagesize
          in: query
          type: integer
          required: false
          description: Items per page (max 100).
        - name: order
          in: query
          type: string
          required: false
          description: Sort direction.
        - name: fromdate
          in: query
          type: integer
          required: false
          description: Unix epoch seconds — earliest creation_date.
        - name: todate
          in: query
          type: integer
          required: false
          description: Unix epoch seconds — latest creation_date.
        - name: tagged
          in: query
          type: string
          required: false
          description: Semicolon-delimited list of tags to AND-filter by.
        - name: sort
          in: query
          type: string
          required: false
          description: sort parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
