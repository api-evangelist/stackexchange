        with:
          ids: rest.ids
          site: rest.site
          key: rest.key
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stack-exchange-posts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stack Exchange API v2.3 — Posts. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-posts
      description: List Posts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stack-exchange-posts.listPosts
      with:
        site: tools.site
        key: tools.key
        filter: tools.filter
        page: tools.page
        pagesize: tools.pagesize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-posts-ids
      description: Get Posts by Ids
