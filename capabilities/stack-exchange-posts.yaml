          type: string
          required: false
          description: Custom response filter id created via /filters/create.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: stack-exchange-posts-rest
    port: 8080
    description: REST adapter for Stack Exchange API v2.3 — Posts. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/posts
      name: posts
      description: REST surface for posts.
      operations:
      - method: GET
        name: listPosts
        description: List Posts
        call: stack-exchange-posts.listPosts
        with:
          site: rest.site
          key: rest.key
          filter: rest.filter
          page: rest.page
          pagesize: rest.pagesize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/posts/{ids}
      name: posts
      description: REST surface for posts.
      operations:
      - method: GET
        name: getPostsByIds
        description: Get Posts by Ids
        call: stack-exchange-posts.getPostsByIds
        with:
          ids: rest.ids
          site: rest.site
          key: rest.key
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/posts/{ids}/comments
      name: comments
      description: REST surface for posts.
      operations:
      - method: GET
        name: listCommentsOnPosts
        description: List Comments on Posts
        call: stack-exchange-posts.listCommentsOnPosts
        with:
          ids: rest.ids
          site: rest.site
          key: rest.key
          filter: rest.filter
          page: rest.page
          pagesize: rest.pagesize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/posts/{ids}/revisions
      name: revisions
      description: REST surface for posts.
      operations:
      - method: GET
        name: listPostsRevisions
