features:
  - name: Network-Wide Q&A Graph
    description: >-
      Single API surface spans 180+ communities. Use the `site` parameter
      (`stackoverflow`, `serverfault`, `superuser`, `askubuntu`, `stats`,
      `mathoverflow`, …) to switch context without changing endpoints.
  - name: Vectorized IDs
    description: >-
      Most methods accept up to 100 semicolon-delimited IDs in a single request
      (e.g., `/questions/{ids}`, `/users/{ids}`, `/answers/{ids}`), making bulk
      fetch and join workloads cheap.
  - name: Filter System
    description: >-
      Custom response filters let consumers project exactly the fields they
      need, dramatically reducing payload size. Filters are created once via
      `/filters/create` and reused.
  - name: Compressed JSON
    description: >-
      All responses are gzip-compressed by default; the wire payload is roughly
      30-50% the size of an unconditioned JSON body.
  - name: Quota and Backoff Discipline
    description: >-
      Every response advertises `quota_max`, `quota_remaining`, and an optional
      `backoff` integer. Clients must honor the backoff before re-querying the
      same method or risk being throttled at 503 / banned.
  - name: OAuth 2.0 Write Access
    description: >-
      Read is unauthenticated. Write methods (post answer, create comment, vote,
      flag, accept) require an OAuth 2.0 access token issued via explicit or
      implicit flows registered on stackapps.com.
  - name: /me Convenience Methods
    description: >-
      Every `/users/{ids}/...` method has a `/me/...` equivalent that infers the
      user from the access token, simplifying agent code paths.
  - name: Site Discovery
    description: >-
      `/sites` enumerates every Q&A community on the network with its
      `api_site_parameter`, audience, launch date, and styling — the canonical
      way to bootstrap a multi-site integration.
  - name: AI Grounding via MCP
    description: >-
      The official Stack Overflow MCP server exposes search, retrieve, and
      ground tools so MCP-compatible clients (Claude Desktop, Cursor, VS Code)
      can reach community-verified answers without bespoke integration.
useCases:
  - name: AI Answer Grounding
    description: >-
      Ground LLM responses in real Stack Overflow questions and answers — either
      directly via /search and /questions methods or through the official MCP
      server — to reduce hallucinations on technical topics.
  - name: Developer Reputation Scoring
    description: >-
      Pull /users, /users/{ids}/reputation, badge counts, and tag scores to
      build developer reputation, expertise, and hiring-signal pipelines.
  - name: Community Analytics
    description: >-
      Aggregate /questions, /tags, /tags/{tags}/info, and /sites data to track
      technology adoption, tag velocity, and community health across the
      network.
  - name: Personal Activity Dashboards
    description: >-
      Use /me, /me/inbox, /me/notifications, /me/timeline, /me/answers, and
      /me/questions to build personal dashboards of a user's own activity,
      reputation, and unread events.
  - name: Tag Tracking and Triage
    description: >-
      Watch /tags/{tags}/info, /questions?tagged=…, /search/advanced, and
      /questions/no-answers to triage incoming questions for OSS projects and
      vendor support teams.
  - name: Knowledge Base Mirroring
    description: >-
      Periodically sweep /questions with a filter and a since-date to mirror Q&A
      into an internal knowledge base or RAG index, respecting the API quota
      and backoff.
  - name: Moderation Workbench
    description: >-
      Combine /suggested-edits, /flags, /posts, and /revisions surfaces (with
      a moderator access token) to build moderation review queues.
  - name: Stack Overflow for Teams Integrations
    description: >-
      Use the v3 Teams API plus the Terraform provider and Backstage plugin to
      provision questions, articles, and tags from CI/CD pipelines.
integrations:
  - name: Claude Desktop / Cursor / VS Code via MCP
    description: >-
      The Stack Overflow MCP server plugs directly into any MCP-compatible
      client, giving AI agents a typed search/retrieve interface to community
      content.
  - name: LangChain
    description: >-
      Official LangChain integration for Stack Overflow for Teams enables
      retrieval and chat over private Teams content from LangChain pipelines.
  - name: Backstage
    description: >-
      Backstage plugin (`backstage-stackoverflow`) surfaces Stack Overflow for
      Teams content inside Backstage developer portals.
  - name: Terraform
    description: >-
      Terraform provider (`terraform-provider-stackoverflow`) manages
      questions, answers, and articles in Stack Overflow for Teams as code.
  - name: StacMan (.NET)
    description: >-
      Long-standing .NET client for Stack Exchange API v2 (StackExchange/StacMan)
      covering the public v2.3 surface.
solutions:
  - name: Public API v2.3
    description: >-
      Read-mostly, unauthenticated public access to the full Q&A graph across
      180+ sites. Default integration path for developer tools, dashboards,
      community analytics, and AI grounding.
  - name: Stack Overflow for Teams API v3
    description: >-
      Private REST API for Stack Overflow for Teams customers, used by the
      TypeScript SDK, Terraform provider, Backstage plugin, and LangChain
      integration.
  - name: Stack Overflow MCP Server
    description: >-
      Beta MCP server that lets MCP-compatible AI clients search, retrieve, and
      ground answers in Stack Overflow content with simple OAuth onboarding.
  - name: Stack Exchange Data Explorer
    description: >-
      SQL-style query interface for the Stack Exchange data dumps, used for
      analytics workloads that exceed the API quota.
