aid: stackexchange
name: Stack Exchange
description: >-
  Stack Exchange is the network of Q&A communities founded by Joel Spolsky and
  Jeff Atwood and headlined by Stack Overflow, the largest community of software
  developers on the web. The Stack Exchange API v2.3 (api.stackexchange.com) is
  a single, read-mostly HTTP/JSON interface that spans 180+ Q&A sites — Stack
  Overflow, Server Fault, Super User, Ask Ubuntu, Stats, Math Overflow, and the
  long tail of topical communities — and exposes the entire Q&A graph
  (questions, answers, comments, users, tags, badges, reputation, revisions,
  notifications, inbox, suggested-edits, network sites) under a uniform method
  surface. Stack Exchange also operates Stack Overflow for Teams (private
  knowledge bases with its own v3 REST API) and ships an official Stack Overflow
  MCP server that grounds AI agents in community-verified content.
