apis:
  - name: Stack Exchange API v2.3
    description: >-
      Public, read-mostly HTTP/JSON API spanning all 180+ Stack Exchange sites.
      All method families — questions, answers, comments, users, tags, badges,
      sites, search, /me, access-tokens, notifications, inbox, events,
      revisions, info, reputation, privileges, suggested-edits, posts — live
      under a single base URL with a uniform response wrapper (items, has_more,
      page, quota_max, quota_remaining, backoff). Read access requires no auth;
      writes (posting, voting, flagging, accepting) require OAuth 2.0 with the
      appropriate scopes (write_access, private_info, no_expiry).
    humanURL: https://api.stackexchange.com/docs
    baseURL: https://api.stackexchange.com/2.3
